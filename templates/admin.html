<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-PRO API | MASTER ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
        }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 glass p-6 rounded-2xl">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">X-PRO COMMAND CENTER</h1>
                <p class="text-slate-400 text-sm">Real-time User Authorization System</p>
            </div>
            <div class="text-right">
                <span class="status-dot bg-green-500 mr-2"></span>
                <span class="text-green-500 font-semibold uppercase text-xs tracking-widest">System Active</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-lg font-semibold mb-4 text-blue-200">Admin Authentication</h2>
                    <input type="password" id="admin_pass" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 focus:border-blue-500 outline-none" placeholder="Enter Admin Password">
                    <p class="text-xs text-slate-500 italic mb-4">* Actions require authentication</p>
                    <button onclick="control('toggle', true)" class="w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-lg font-bold transition mb-2">SYSTEM ON/OFF</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                
                <div class="glass p-6 rounded-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-semibold text-yellow-500">Access Requests</h2>
                        <span id="req_count" class="bg-yellow-500/20 text-yellow-500 px-3 py-1 rounded-full text-xs font-bold">0 Pending</span>
                    </div>
                    <div id="pending-list" class="space-y-4">
                        <p class="text-slate-500 text-sm italic">Waiting for new requests...</p>
                    </div>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-lg font-semibold text-green-500 mb-6">Whitelisted Clients (Authorized)</h2>
                    <div id="approved-list" class="space-y-3">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/api/v1/status');
                const data = await res.json();
                
                // Pending Logic
                const pList = document.getElementById('pending-list');
                document.getElementById('req_count').innerText = `${data.pending.length} Pending`;
                pList.innerHTML = data.pending.length ? '' : '<p class="text-slate-600 text-sm">No new requests found.</p>';
                
                data.pending.forEach(req => {
                    pList.innerHTML += `
                        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center border-l-4 border-l-yellow-500">
                            <div class="truncate mr-4">
                                <div class="font-bold text-blue-100">${req.ip}</div>
                                <div class="text-[10px] text-slate-500 truncate max-w-[200px]">${req.ua}</div>
                                <div class="text-[10px] text-blue-500 mt-1">Requested at: ${req.time}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="control('approve', '${req.ip}')" class="bg-green-600 hover:bg-green-500 text-xs font-bold px-4 py-2 rounded-lg">Approve</button>
                                <button onclick="control('reject', '${req.ip}')" class="bg-red-600 hover:bg-red-500 text-xs font-bold px-4 py-2 rounded-lg">Decline</button>
                            </div>
                        </div>
                    `;
                });

                // Approved Logic
                const aList = document.getElementById('approved-list');
                aList.innerHTML = data.approved.length ? '' : '<p class="text-slate-600 text-sm">No authorized users yet.</p>';
                data.approved.forEach(ip => {
                    aList.innerHTML += `
                        <div class="bg-slate-900/30 p-3 rounded-lg flex justify-between items-center border border-slate-800">
                            <span class="font-mono text-sm text-green-400">${ip}</span>
                            <button onclick="control('remove', '${ip}')" class="text-red-500 hover:text-red-400 text-xs font-bold">Revoke Access</button>
                        </div>
                    `;
                });

            } catch (err) { console.log("Fetch error"); }
        }

        async function control(action, val) {
            const auth = document.getElementById('admin_pass').value;
            if(!auth) return alert("Please enter Admin Password first!");

            const res = await fetch('/api/v1/control', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ auth, action, value: val })
            });
            const result = await res.json();
            if(res.status === 200) {
                fetchData();
            } else {
                alert(result.msg);
            }
        }

        setInterval(fetchData, 4000);
        fetchData();
    </script>
</body>
</html>
